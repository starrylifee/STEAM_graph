<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>막대그래프 STEAM 게임</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="app-header">
      <button id="back-button" class="tool-button ghost hidden" type="button" aria-label="처음으로">처음</button>
      <div class="brand-block">
        <p class="eyebrow">STEAM 수학 미니게임</p>
        <h1 id="app-title">막대그래프 게임 연구소</h1>
      </div>
      <div class="header-actions">
        <button id="sound-button" class="tool-button" type="button" aria-pressed="true">소리 켬</button>
      </div>
    </header>

    <main>
      <section id="dashboard-view" class="view">
        <div class="dashboard-top">
          <div>
            <p class="eyebrow">학생 설계 PDF 기반</p>
            <h2>막대그래프를 만들고, 비교하고, 구조물로 바꾸는 다섯 가지 게임</h2>
          </div>
          <div class="quick-stats">
            <span>5개 게임</span>
            <span>19쪽 설계</span>
            <span>막대그래프</span>
          </div>
        </div>
        <div id="game-grid" class="game-grid" aria-label="게임 선택"></div>
      </section>

      <section id="game-view" class="view hidden">
        <div class="game-shell">
          <aside class="status-panel">
            <p class="eyebrow">현재 게임</p>
            <h2 id="game-title"></h2>
            <p id="game-student" class="student-line"></p>
            <p id="game-concept" class="concept-line"></p>

            <div class="metric-grid">
              <div>
                <span>단계</span>
                <strong id="level-label">1</strong>
              </div>
              <div>
                <span>점수</span>
                <strong id="score-label">0</strong>
              </div>
              <div>
                <span>기회</span>
                <strong id="attempt-label">3</strong>
              </div>
            </div>

            <button id="design-button" class="tool-button wide" type="button">학생 설계 보기</button>
          </aside>

          <section class="play-stage">
            <div id="scene" class="scene" aria-live="polite"></div>
          </section>

          <aside id="controls" class="control-panel"></aside>
        </div>
      </section>
    </main>

    <div id="result-overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="overlay-panel">
        <p id="overlay-kicker" class="eyebrow"></p>
        <h2 id="overlay-title"></h2>
        <p id="overlay-message"></p>
        <button id="overlay-button" class="primary-button" type="button">계속</button>
      </div>
    </div>

    <div id="design-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="학생 설계 보기">
      <div class="modal-panel">
        <div class="modal-header">
          <div>
            <p class="eyebrow">원본 설계</p>
            <h2 id="design-title"></h2>
          </div>
          <div class="modal-actions">
            <!-- PDF 열기 / 원본 보기 비활성화: 읽기용 이미지만 사용
            <a id="pdf-link" class="tool-button" href="source/20260611075405.pdf" target="_blank" rel="noreferrer">PDF 열기</a>
            <div class="view-toggle" role="group" aria-label="설계 이미지 보기 방식">
              <button id="sheet-readable" class="tool-button active" type="button">읽기용</button>
              <button id="sheet-original" class="tool-button" type="button">원본</button>
            </div>
            -->
            <button id="close-design-button" class="tool-button ghost" type="button">닫기</button>
          </div>
        </div>
        <div class="sheet-viewer">
          <button id="sheet-prev" class="tool-button" type="button">이전</button>
          <figure>
            <img id="sheet-image" src="" alt="">
            <figcaption id="sheet-caption"></figcaption>
          </figure>
          <button id="sheet-next" class="tool-button" type="button">다음</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
