    <rect x="244" y="22" width="44" height="44" rx="10" fill="#fff" stroke="#f0c4b2" stroke-width="2"/>
    <rect x="298" y="22" width="44" height="44" rx="10" fill="#fff" stroke="#f0c4b2" stroke-width="2"/>
    <rect x="352" y="22" width="44" height="44" rx="10" fill="#fff" stroke="#f0c4b2" stroke-width="2"/>
    <text x="266" y="54" font-size="26" text-anchor="middle">🏪</text>
    <text x="320" y="54" font-size="26" text-anchor="middle">🏠</text>
    <text x="374" y="54" font-size="26" text-anchor="middle">✈️</text>
  </g>
  <!-- 컨베이어 벨트 -->
  <rect x="-10" y="118" width="420" height="26" rx="13" fill="#565a68"/>
  <g fill="#3d404c">
    <circle cx="40" cy="152" r="9"/>
    <circle cx="120" cy="152" r="9"/>
