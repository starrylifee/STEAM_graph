    <rect x="44" y="170" width="120" height="58" rx="10" fill="#fff" stroke="#f0c4b2" stroke-width="2"/>
    <rect x="58" y="190" width="22" height="30" rx="4" fill="#d95f4f"/>
    <rect x="88" y="182" width="22" height="38" rx="4" fill="#e2806f"/>
