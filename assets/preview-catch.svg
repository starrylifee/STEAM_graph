<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2134"/>
      <stop offset="1" stop-color="#2a3354"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe9ad" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffe9ad" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <text x="358" y="44" font-size="30" text-anchor="middle">🌙</text>
  <!-- 손전등 빛 -->
  <polygon points="18,232 250,30 330,150" fill="url(#beam)"/>
  <text x="26" y="232" font-size="34" text-anchor="middle">🔦</text>
  <!-- 빛 안의 녀석들 -->
  <text x="180" y="130" font-size="34" text-anchor="middle">🐛</text>
  <text x="250" y="100" font-size="34" text-anchor="middle">🐭</text>
  <!-- 빛 밖, 어둠에 숨은 녀석들 -->
  <text x="346" y="210" font-size="30" text-anchor="middle" opacity="0.28">🦗</text>
  <text x="90" y="70" font-size="28" text-anchor="middle" opacity="0.25">🦇</text>
  <!-- 포획 그래프 -->
  <g opacity="0.95">
    <rect x="282" y="186" width="22" height="40" rx="5" fill="#e2a72c"/>
    <rect x="312" y="172" width="22" height="54" rx="5" fill="#d95f4f"/>
    <rect x="342" y="196" width="22" height="30" rx="5" fill="#3f75c9"/>
    <rect x="276" y="226" width="96" height="4" rx="2" fill="#8a93b5"/>
  </g>
</svg>
